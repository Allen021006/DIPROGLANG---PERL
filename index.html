<script>
// API — all calls go through here
const API = 'api.php';

async function api(action, data = null, method = 'GET') {
  try {
    let url = API + '?action=' + action;
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (method === 'GET' && data) {
      url += '&' + new URLSearchParams(data).toString();
    } else if (method !== 'GET' && data) {
      opts.body = JSON.stringify(data);
    }
    const res = await fetch(url, opts);
    const json = await res.json();
    if (!res.ok) throw new Error(json.message || 'Server error');
    return json;
  } catch (e) {
    showToast(e.message, 'error');
    throw e;
  }
}

function getDDCClass(dewey) {
  const base = (dewey||'').split('.')[0];
  const key  = String(Math.floor(parseInt(base)/100)*100).padStart(3,'0');
  return DDC[key] || null;
}

// UI HELPERS

}
function fmt(d) {

let toastTimer = null;
function showToast(msg, type='info') {
  document.getElementById('toast-container').innerHTML =
    `<div class="toast ${type}">${msg}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ document.getElementById('toast-container').innerHTML=''; }, 3500);
}

function showModal(html) {
  document.getElementById('modal-container').innerHTML =
    `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}

function closeModal() {
  document.getElementById('modal-container').innerHTML='';
}

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}
function loading() {
  setContent('<div class="loading"><span class="spinner"></span>Loading...</div>');
}

const TITLES = {
  dashboard:'Dashboard', books:'All Books', search:'Search Catalog',
  'add-book':'Add Book', borrow:'Borrow a Book', return:'Return a Book',
  records:'Borrow Records & Overdue Report', ddc:'Dewey Decimal Browser',
  stats:'Statistics Dashboard'
};

function showView(view) {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${view}'`))
  );
  document.getElementById('topbar-title').textContent = TITLES[view] || view;
  loading();
  switch(view) {
    case 'dashboard': renderDashboard(); break;
    case 'books':     renderBooks(); break;
    case 'search':    renderSearch(); break;
    case 'add-book':  renderAddBook(); break;
    case 'borrow':    renderBorrow(); break;
    case 'return':    renderReturn(); break;
    case 'records':   renderRecords(); break;
    case 'ddc':       renderDDC(); break;
    case 'stats':     renderStats(); break;
  }
}

// DASHBOARD
async function renderDashboard() {
  const [books, records] = await Promise.all([
    api('get_books', {}, 'GET'),
    api('get_records', {}, 'GET')
  ]);
  const total     = books.length;
  const available = books.filter(b=>b.status==='available').length;
  const borrowed  = books.filter(b=>b.status==='borrowed').length;
  const overdue   = records.filter(r=>r.status==='overdue');
  const recent    = [...books].slice(-5).reverse();
  const recentRec = records.slice(0,4);

  // Update overdue nav badge
  const navRec = document.getElementById('nav-records');
  const existing = navRec.querySelector('.nav-badge');
  if (existing) existing.remove();
  if (overdue.length > 0) {
    navRec.insertAdjacentHTML('beforeend', `<span class="nav-badge">${overdue.length}</span>`);
  }

  setContent(`
  <div class="card-grid">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total Books</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${available}</div><div class="stat-lbl">Available</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${borrowed}</div><div class="stat-lbl">Borrowed</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${overdue.length}</div><div class="stat-lbl">Overdue</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${records.length}</div><div class="stat-lbl">Transactions</div></div>
  </div>
  ${overdue.length > 0 ? `
  <div class="card" style="border-color:#4a3000">
    <div class="card-title" style="color:var(--amber)">⚠ Overdue Books (${overdue.length})</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Patron</th><th>Book</th><th>Due Date</th><th>Days Late</th><th>Fine</th></tr></thead>
      <tbody>${overdue.map(r=>`<tr class="overdue-row">
        <td>${r.patron_name}</td><td class="td-title">${r.book_title}</td>
        <td class="td-year">${fmt(r.due_date)}</td>
        <td><span class="badge badge-overdue">${r.days_late} day${r.days_late!=1?'s':''}</span></td>
        <td style="color:var(--amber);font-family:var(--mono)">₱${r.fee}.00</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>` : ''}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;flex-wrap:wrap;">
    <div class="card">
      <div class="card-title">Recent Books</div>
      ${recent.map(b=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text)">${b.title}</div>
            <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${b.author} · DDC ${b.dewey}</div>
          </div>
          <span class="badge badge-${b.status}">${b.status}</span>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Recent Transactions</div>
      ${recentRec.length === 0 ? '<div class="empty" style="padding:20px">No transactions yet</div>' :
        recentRec.map(r=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text)">${r.patron_name}</div>
            <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${r.book_title} · Due ${fmt(r.due_date)}</div>
          </div>

  if (filterStatus !== 'all') books = books.filter(b=>b.status===filterStatus);
  const total = books.length;
  const av = books.filter(b=>b.status==='available').length;
  const br = books.filter(b=>b.status==='borrowed').length;

  setContent(`
  <div class="search-bar">
    <input type="text" id="books-search" placeholder="Filter by title or author..." oninput="filterBooksTable(this.value)" style="max-width:320px;"/>
    <select onchange="renderBooks('${filterStatus}',this.value)" style="width:160px;">
      <option value="dewey" ${sortBy==='dewey'?'selected':''}>Sort: DDC</option>
      <option value="title" ${sortBy==='title'?'selected':''}>Sort: Title</option>
      <option value="author" ${sortBy==='author'?'selected':''}>Sort: Author</option>
      <option value="year" ${sortBy==='year'?'selected':''}>Sort: Year</option>
      <option value="id" ${sortBy==='id'?'selected':''}>Sort: ID</option>

  </div>
  <div class="filter-row">
    <button class="filter-btn ${filterStatus==='all'?'active':''}" onclick="renderBooks('all','${sortBy}')">All (${books.length + (filterStatus==='available'?br:filterStatus==='borrowed'?av:0)})</button>
    <button class="filter-btn ${filterStatus==='available'?'active':''}" onclick="renderBooks('available','${sortBy}')">Available</button>
    <button class="filter-btn ${filterStatus==='borrowed'?'active':''}" onclick="renderBooks('borrowed','${sortBy}')">Borrowed</button>
  </div>
  <div class="tbl-wrap">
  <table id="books-table">
    <thead><tr><th>ID</th><th>Title</th><th>Author</th><th>DDC</th><th>Year</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
    ${books.map(b => {
      const ddcCls = getDDCClass(b.dewey);
      return `<tr data-search="${(b.title+' '+b.author).toLowerCase()}">
        <td class="td-id">#${b.id}</td>
        <td class="td-title">${b.title}</td>
        <td style="color:var(--text2)">${b.author}</td>
        <td><span class="td-ddc">${b.dewey}</span><br><span style="font-size:10px;color:var(--text3)">${ddcCls?ddcCls.name.slice(0,24):''}</span></td>
        <td class="td-year">${b.year}</td>
        <td><span class="badge badge-${b.status}">${b.status}</span></td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick='openEditBook(${JSON.stringify(b)})' style="margin-right:4px">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDelete(${b.id},'${b.title.replace(/'/g,"\\'")}','${b.status}')">Del</button>
        </td>
      </tr>`;

  </table>

  <div style="margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--text3)">
    Showing ${total} book(s)
  </div>`);
}

function filterBooksTable(val) {
  document.querySelectorAll('#books-table tbody tr').forEach(tr => {
    tr.style.display = (tr.dataset.search||'').includes(val.toLowerCase()) ? '' : 'none';
  });
}

async function submitAddBook() {
  const title  = document.getElementById('ab-title').value.trim();
  const author = document.getElementById('ab-author').value.trim();
  const dewey  = document.getElementById('ab-dewey').value.trim();
  const year   = parseInt(document.getElementById('ab-year').value);
  const curYr  = new Date().getFullYear();

  if (!title||!author){
    showToast('Title and Author are required','error');
    return;
  }
  if (!/^\d{3}(\.\d{1,4})?$/.test(dewey)){
    showToast('Invalid DDC format','error');
    return;
  }
  if (isNaN(year)||year<1950||year>curYr){
    showToast('Invalid year','error');
    return;
  }

  await api('add_book', {title,author,dewey,year}, 'POST');
  showToast(`"${title}" added to catalog!`, 'success');
  showView('books');
}

async function renderBorrow() {
  const books = await api('get_books', {}, 'GET');
  const available = books.filter(b=>b.status==='available');
  const todayStr = today();
  const tomorrowStr = new Date(Date.now()+86400000).toISOString().slice(0,10);
  const maxStr = new Date(Date.now()+21*86400000).toISOString().slice(0,10);

  setContent(`
  <div class="card" style="max-width:640px;">
    <div class="card-title">↗ Borrow a Book</div>
    ${available.length===0
      ? '<div class="empty">No books currently available</div>'
      : `<div class="form-row full"><div class="form-group">
          <label class="form-label">Select Book *</label>
          <select class="form-input" id="br-book" onchange="updateBorrowInfo(this.value,${JSON.stringify(books).replace(/"/g,'&quot;')})">
            <option value="">— Choose an available book —</option>
            ${available.map(b=>`<option value="${b.id}">#${b.id} — ${b.title} (${b.author})</option>`).join('')}
          </select>
        </div></div>
        <div id="borrow-book-info" style="display:none;background:var(--bg3);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;font-size:12px;font-family:var(--mono);color:var(--text2)"></div>
        <div class="form-row full"><div class="form-group">
          <label class="form-label">Patron Name *</label>
          <input class="form-input" id="br-patron" type="text" placeholder="Full name of borrower"/>
        </div></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Borrow Date</label>
            <input class="form-input" type="date" value="${todayStr}" readonly style="opacity:.6"/>
          </div>
          <div class="form-group">
            <label class="form-label">Due Date * (max 21 days)</label>
            <input class="form-input" id="br-due" type="date" min="${tomorrowStr}" max="${maxStr}" value="${tomorrowStr}"/>
          </div>
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:4px">Overdue fee: ₱5.00/day · Max loan: 21 days</div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="submitBorrow()">Confirm Borrow</button>
          <button class="btn btn-secondary" onclick="showView('books')">Cancel</button>
        </div>`}
  </div>`);
}

function updateBorrowInfo(id, books) {
  const b = books.find(x=>x.id==id);
  const el = document.getElementById('borrow-book-info');
  if (!b){
    el.style.display='none';
    return;
  }

  const ddcCls = getDDCClass(b.dewey);
  el.style.display='block';
  el.innerHTML=`<span style="color:var(--teal)">${b.dewey}</span> — ${ddcCls?ddcCls.name:''} &nbsp;|&nbsp; ${b.year}`;
}

async function submitBorrow() {
  const book_id    = parseInt(document.getElementById('br-book').value);
  const patron_name = document.getElementById('br-patron').value.trim();
  const due_date   = document.getElementById('br-due').value;
  if (!book_id){
    showToast('Please select a book','error');
    return;
  }
  if (!patron_name){
    showToast('Patron name is required','error');
    return;
  }
  if (!due_date||due_date<=today()){
    showToast('Due date must be after today','error');
    return;
  }

  const res = await api('borrow_book', {book_id, patron_name, due_date}, 'POST');
  showToast('Book borrowed successfully!', 'success');
  showView('records');
}

// RETURN
async function renderReturn() {
  const books = await api('get_books', {}, 'GET');
  const borrowed = books.filter(b=>b.status==='borrowed');

  setContent(`
  <div class="card" style="max-width:640px;">
    <div class="card-title">↩ Return a Book</div>
    ${borrowed.length===0
      ? '<div class="empty">No books currently borrowed</div>'
      : `<div class="form-row full"><div class="form-group">
          <label class="form-label">Select Book to Return *</label>
          <select class="form-input" id="ret-book" onchange="showReturnDetails(this.value)">
            <option value="">— Choose a borrowed book —</option>
            ${borrowed.map(b=>`<option value="${b.id}">#${b.id} — ${b.title}</option>`).join('')}
          </select>
        </div></div>
        <div id="return-details"></div>
        <div class="form-actions">
          <button class="btn btn-success" onclick="submitReturn()">Confirm Return</button>
          <button class="btn btn-secondary" onclick="showView('records')">Cancel</button>
        </div>`}
  </div>`);
}

async function showReturnDetails(id) {
  if (!id){
    document.getElementById('return-details').innerHTML='';
    return;
  }

  const records = await api('get_records', {}, 'GET');
  const rec = records.filter(r=>r.book_id==id&&r.status!=='returned').pop();
  if (!rec){
    document.getElementById('return-details').innerHTML='<div style="color:var(--red);font-size:12px">No active borrow record</div>';
    return;
  }

  const late = rec.days_late || 0;
  const fee  = late * 5;
  document.getElementById('return-details').innerHTML=`
  <div class="card" style="background:var(--bg3);margin-bottom:0">
    <table style="width:100%;font-size:13px;font-family:var(--mono)">
      <tr><td style="color:var(--text3);padding:5px 0;width:140px">Book</td><td style="color:var(--text)">${rec.book_title}</td></tr>
      <tr><td style="color:var(--text3);padding:5px 0">Patron</td><td>${rec.patron_name}</td></tr>
      <tr><td style="color:var(--text3);padding:5px 0">Borrowed</td><td>${fmt(rec.borrow_date)}</td></tr>
      <tr><td style="color:var(--text3);padding:5px 0">Due Date</td><td>${fmt(rec.due_date)}</td></tr>
      <tr><td style="color:var(--text3);padding:5px 0">Return Date</td><td style="color:var(--green)">${fmt(today())} (today)</td></tr>
    </table>
    ${late>0
      ? `<div class="fee-box"><div style="font-size:12px;color:var(--text2);margin-bottom:4px">OVERDUE FINE — ${late} day(s) late</div><div class="fee-amount">₱${fee}.00</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px">₱5.00/day × ${late} days</div></div>`
      : `<div style="color:var(--green);font-size:12px;font-family:var(--mono);margin-top:10px">✓ On time — no overdue fee</div>`}
  </div>`;
}

async function submitReturn() {
  const book_id = parseInt(document.getElementById('ret-book').value);
  if (!book_id){
    showToast('Please select a book','error');
    return;
  }

  const res = await api('return_book', {book_id}, 'POST');
  if (res.days_late > 0)
    showToast(`Returned with ₱${res.fee}.00 overdue fine`, 'info');
  else
    showToast('Book returned — no fine!', 'success');
  showView('records');
}

    const c = DDC[selectedClass];
    const books = await api('get_books', {}, 'GET');
    const filtered = books.filter(b=>b.dewey.startsWith(selectedClass.charAt(0)));
    setContent(`
    <button class="btn btn-secondary btn-sm" onclick="renderDDC()" style="margin-bottom:16px">← Back to DDC Classes</button>
    <div class="card">
      <div class="card-title" style="color:${c.color}">DDC ${selectedClass} — ${c.name}</div>
      ${Object.entries(c.subs).map(([k,v])=>`
        <div class="ddc-sub-row"><span class="ddc-sub-code">${k}</span><span class="ddc-sub-name">${v}</span></div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Books in DDC ${selectedClass}.xxx</div>
      ${filtered.length===0
        ? '<div class="empty">No books in this class yet</div>'
        : `<div class="tbl-wrap"><table>
            <thead><tr><th>ID</th><th>Title</th><th>Author</th><th>DDC</th><th>Year</th><th>Status</th></tr></thead>
            <tbody>${filtered.map(b=>`<tr>
              <td class="td-id">#${b.id}</td><td class="td-title">${b.title}</td>
              <td>${b.author}</td><td class="td-ddc">${b.dewey}</td>
              <td class="td-year">${b.year}</td>
              <td><span class="badge badge-${b.status}">${b.status}</span></td>
            </tr>`).join('')}</tbody>
           </table></div>`}
    </div>`);
    return;
  }

  const books = await api('get_books', {}, 'GET');
  setContent(`<div class="ddc-grid">
    ${Object.entries(DDC).map(([k,v])=>{
      const cnt = books.filter(b=>b.dewey.startsWith(k.charAt(0))).length;
      return `<div class="ddc-card" onclick="renderDDC('${k}')">
        <div class="ddc-code" style="color:${v.color}">${k}</div>
        <div class="ddc-name">${v.name}</div>
        <div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--text3)">${cnt} book(s)</div>
      </div>`;
    }).join('')}
  </div>`);
}

// SEARCH
function renderSearch() {
  setContent(`
  <div class="card">
    <div class="card-title">Search Catalog</div>
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <select id="search-mode" style="width:160px;">
        <option value="title">By Title</option>
        <option value="author">By Author</option>
        <option value="dewey">By DDC Number</option>
      </select>
      <input type="text" id="search-q" placeholder="Enter search term..." style="flex:1;min-width:200px;" onkeydown="if(event.key==='Enter')doSearch()"/>
      <button class="btn btn-primary" onclick="doSearch()">Search</button>
    </div>
  </div>
  <div id="search-results"></div>`);
}

async function doSearch() {
  const mode = document.getElementById('search-mode').value;
  const q    = document.getElementById('search-q').value.trim();
  if (!q){
    showToast('Enter a search term','error');
    return;
  }

  const books = await api('get_books', {}, 'GET');
  let results;
  if (mode==='title')
    results = books.filter(b=>b.title.toLowerCase().includes(q.toLowerCase()));
  else if (mode==='author') 
    results = books.filter(b=>b.author.toLowerCase().includes(q.toLowerCase()));
  else 
    results = books.filter(b=>b.dewey.startsWith(q));

  document.getElementById('search-results').innerHTML = results.length===0
    ? `<div class="empty"><div style="font-size:32px;margin-bottom:8px">◌</div>No books found for "${q}"</div>`
    : `<div class="tbl-wrap"><table>
        <thead><tr><th>ID</th><th>Title</th><th>Author</th><th>DDC</th><th>Year</th><th>Status</th></tr></thead>
        <tbody>${results.map(b=>`<tr>
          <td class="td-id">#${b.id}</td><td class="td-title">${b.title}</td>
          <td>${b.author}</td><td class="td-ddc">${b.dewey}</td>
          <td class="td-year">${b.year}</td>
          <td><span class="badge badge-${b.status}">${b.status}</span></td>
        </tr>`).join('')}</tbody>
       </table></div>
       <div style="margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--text3)">${results.length} result(s)</div>`;
}

// STATISTICS
async function renderStats() {
  const [stats, books] = await Promise.all([
    api('get_stats', {}, 'GET'),
    api('get_books',  {}, 'GET')
  ]);
  const avPct = stats.total>0?Math.round(stats.available/stats.total*100):0;
  const bPct  = stats.total>0?Math.round(stats.borrowed/stats.total*100):0;
  const ddcEntries = Object.entries(DDC).map(([k,v])=>({
    k,v,cnt:stats.ddc_counts[k]||0
  })).filter(x=>x.cnt>0);
  const maxCnt = Math.max(...ddcEntries.map(x=>x.cnt), 1);

  setContent(`
  <div class="card-grid">
    <div class="stat-card"><div class="stat-num">${stats.total}</div><div class="stat-lbl">Total Books</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${stats.available} (${avPct}%)</div><div class="stat-lbl">Available</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${stats.borrowed} (${bPct}%)</div><div class="stat-lbl">Borrowed</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${stats.overdue}</div><div class="stat-lbl">Overdue</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${stats.txns}</div><div class="stat-lbl">Transactions</div></div>
  </div>
  <div class="card">
    <div class="card-title">Books by DDC Class</div>
    ${ddcEntries.length===0
      ? '<div class="empty">No books in catalog yet</div>'
      : ddcEntries.map(({k,v,cnt})=>`
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
            <span style="font-family:var(--mono);font-size:12px">
              <span style="color:${v.color}">${k}</span>
              <span style="color:var(--text2)"> ${v.name.slice(0,40)}</span>
            </span>
            <span style="font-family:var(--mono);font-size:12px;color:var(--amber)">${cnt}</span>
          </div>
          <div class="stats-bar">
            <div class="stats-fill" style="width:${Math.round(cnt/maxCnt*100)}%;background:${v.color}"></div>
          </div>
        </div>`).join('')}
  </div>`);
}

// START
showView('dashboard');
</script>
